<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Journey &mdash; Learning Map</title>
    <meta name="description" content="My personal learning timeline across web development, cybersecurity, networking, and ethical hacking.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Header loads automatically via loader.js -->

    <header class="hero">
        <h1>
            <i class="fas fa-map"></i> My <span class="highlight">Learning Journey</span>
        </h1>
        <p>How I went from zero to building this &mdash; and where I'm going next.</p>
    </header>

    <section class="container">
        <div class="timeline" id="timeline-container"></div>
    </section>

    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>

    <script src="js/loader.js"></script>
    <script src="js/main.js"></script>
    <script>
        (function () {
            'use strict';

            fetch('data/timeline.json')
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    document.getElementById('timeline-container').innerHTML = data.journey.map(function (item) {
                        return (
                            '<div class="timeline-item">' +
                                '<div class="timeline-content">' +
                                    '<span class="timeline-date">' + item.date + '</span>' +
                                    '<h3>' + item.title + '</h3>' +
                                    '<p style="color: var(--text-light); margin: 0.75rem 0;">' + item.description + '</p>' +
                                    '<div class="card-tags">' +
                                        item.skills.map(function (s) {
                                            return '<span class="tag tag-beginner">' + s + '</span>';
                                        }).join('') +
                                    '</div>' +
                                    '<p style="font-size: 0.85rem; color: var(--text-light); margin-top: 0.75rem;">' +
                                        '<strong>Resources:</strong> ' + item.resources.join(', ') +
                                    '</p>' +
                                '</div>' +
                                '<div class="timeline-dot"></div>' +
                                '<div style="width: 45%;"></div>' +
                            '</div>'
                        );
                    }).join('');
                });
        })();
    </script>
</body>
</html>
