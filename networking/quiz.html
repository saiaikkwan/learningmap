<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Networking Quiz &mdash; Learning Map</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Header loads automatically via loader.js -->

    <div class="page-with-sidebar" style="padding-top: 80px;">
        <aside class="sidebar">
            <p class="sidebar-title">
                <i class="fas fa-network-wired"></i> Networking
            </p>
            <ul class="sidebar-menu">
                <li><a href="index.html">Overview</a></li>
                <li><a href="fundamentals.html">Fundamentals</a></li>
                <li><a href="cisco.html">Cisco Track</a></li>
                <li><a href="quiz.html" class="active">Take Quiz</a></li>
            </ul>
        </aside>

        <main class="content-area">
            <header class="hero">
                <h1>
                    <i class="fas fa-clipboard-check"></i> Networking <span class="highlight">Quiz</span>
                </h1>
                <p>Test your networking knowledge &mdash; OSI, TCP/IP, Cisco, and more.</p>
            </header>

            <div class="quiz-container" id="quiz-container">
                <p style="text-align: center; color: var(--text-light);">Loading quiz&hellip;</p>
            </div>
        </main>
    </div>

    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>

    <script src="../js/loader.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/quiz-engine.js"></script>
    <script>
        (function () {
            'use strict';

            var quizContainer = document.getElementById('quiz-container');

            fetch('../data/quizzes.json')
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    var quiz = new QuizEngine(
                        'quiz-container',
                        data.networking.questions,
                        'networking'
                    );
                    quiz.start();
                })
                .catch(function (err) {
                    quizContainer.innerHTML =
                        '<p style="text-align:center;color:var(--danger);">' +
                        'Failed to load quiz. ' + err.message +
                        '</p>';
                });
        })();
    </script>
</body>
</html>
