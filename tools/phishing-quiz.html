<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Quiz &mdash; Learning Map</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Header loads automatically via loader.js -->

    <header class="hero">
        <h1>
            <i class="fas fa-envelope"></i> Phishing <span class="highlight">Email Quiz</span>
        </h1>
        <p>Can you tell the difference between legitimate and phishing emails?</p>
    </header>

    <section class="container">
        <div class="tool-container" style="max-width: 650px;">
            <div id="phishing-quiz-container">
                <div class="email-preview">
                    <div class="email-header">
                        <div class="email-subject" id="email-subject"></div>
                        <div class="email-from" id="email-from"></div>
                    </div>
                    <div class="email-body" id="email-body"></div>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 1.5rem; justify-content: center;">
                    <button id="legit-btn" class="btn btn-outline" style="border-color: var(--success); color: var(--success);">
                        <i class="fas fa-check"></i> Legitimate
                    </button>
                    <button id="phish-btn" class="btn btn-outline" style="border-color: var(--danger); color: var(--danger);">
                        <i class="fas fa-exclamation-triangle"></i> Phishing
                    </button>
                </div>

                <p id="phish-feedback" style="text-align: center; margin-top: 1rem; font-weight: 600;"></p>

                <div class="text-center mt-2">
                    <button id="next-email-btn" class="btn btn-primary hidden">Next Email &rarr;</button>
                </div>

                <p style="text-align: center; margin-top: 1rem; color: var(--text-light);">
                    Score: <span id="phish-score">0</span> / <span id="phish-total">0</span>
                </p>
            </div>
        </div>
    </section>

    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>

    <script src="../js/loader.js"></script>
    <script src="../js/main.js"></script>
    <script>
        (function () {
            'use strict';

            var emails = [
                {
                    subject: 'Your account has been compromised',
                    from: 'security@paypa1.com',
                    body: '<p>Dear Customer,</p><p>We have detected unusual activity on your account. Please <a href="#" class="email-link">click here to verify your identity</a> immediately or your account will be suspended within 24 hours.</p><p>Regards,<br>PayPal Security Team</p>',
                    isPhishing: true,
                    explanation: 'The domain "paypa1.com" uses a number 1 instead of the letter L. Legitimate companies never threaten immediate suspension. Always check the full sender email address.'
                },
                {
                    subject: 'Your monthly statement is ready',
                    from: 'noreply@chase.com',
                    body: '<p>Hi,</p><p>Your monthly account statement for March 2026 is now available. You can view it by logging into your account through the Chase mobile app or at chase.com.</p><p>Thank you,<br>Chase Customer Service</p>',
                    isPhishing: false,
                    explanation: 'This is legitimate. The email doesn\'t include direct links, doesn\'t create urgency, and directs you to use the official app or type the URL yourself.'
                },
                {
                    subject: 'You won a free iPhone 16!',
                    from: 'prizes@winning-notifications.xyz',
                    body: '<p>CONGRATULATIONS!</p><p>You have been selected as the winner of our daily draw! Claim your brand new iPhone 16 by <a href="#" class="email-link">clicking here</a> and entering your shipping details.</p><p>Hurry! Offer expires in 2 hours!</p>',
                    isPhishing: true,
                    explanation: 'Too good to be true = phishing. The .xyz domain, extreme urgency, and request for personal information are all red flags.'
                },
                {
                    subject: 'Your sign-in alert',
                    from: 'no-reply@accounts.google.com',
                    body: '<p>Hi User,</p><p>Your Google Account was just signed in to from a new Windows device. If this was you, you can ignore this message. If not, we recommend you <a href="#" class="email-link">review your account activity</a>.</p><p>Google Account Team</p>',
                    isPhishing: false,
                    explanation: 'This is typical of legitimate security alerts. It informs without panicking, and the sender domain is correctly google.com. Always verify by checking your account directly.'
                }
            ];

            var currentEmail = 0;
            var score = 0;
            var answered = false;

            var subjectEl = document.getElementById('email-subject');
            var fromEl = document.getElementById('email-from');
            var bodyEl = document.getElementById('email-body');
            var feedbackEl = document.getElementById('phish-feedback');
            var scoreEl = document.getElementById('phish-score');
            var totalEl = document.getElementById('phish-total');
            var nextBtn = document.getElementById('next-email-btn');
            var legitBtn = document.getElementById('legit-btn');
            var phishBtn = document.getElementById('phish-btn');

            function loadEmail() {
                if (currentEmail >= emails.length) {
                    var emoji = score === emails.length ? '&#127942;' :
                        score >= emails.length / 2 ? '&#128077;' : '&#128218;';

                    document.getElementById('phishing-quiz-container').innerHTML =
                        '<div class="quiz-score">' +
                            '<div style="font-size: 4rem;">' + emoji + '</div>' +
                            '<h3>' + score + ' / ' + emails.length + ' Correct</h3>' +
                            '<p style="color: var(--text-light);">' +
                                (score === emails.length
                                    ? 'Perfect! You have a sharp eye for phishing.'
                                    : 'Keep practicing! Phishing emails get more sophisticated every day.') +
                            '</p>' +
                            '<button class="btn btn-primary mt-2" onclick="location.reload()">Try Again</button>' +
                        '</div>';
                    return;
                }

                var email = emails[currentEmail];
                subjectEl.textContent = email.subject;
                fromEl.textContent = 'From: ' + email.from;
                bodyEl.innerHTML = email.body;
                feedbackEl.textContent = '';
                feedbackEl.style.color = '';
                nextBtn.classList.add('hidden');
                legitBtn.disabled = false;
                phishBtn.disabled = false;
                answered = false;
                totalEl.textContent = currentEmail;
            }

            function answer(guessIsPhishing) {
                if (answered) return;
                answered = true;

                var email = emails[currentEmail];
                var correct = email.isPhishing === guessIsPhishing;

                if (correct) score++;
                scoreEl.textContent = score;

                feedbackEl.textContent = (correct ? '&#10004; Correct! ' : '&#10008; Wrong! ') + email.explanation;
                feedbackEl.style.color = correct ? 'var(--success)' : 'var(--danger)';

                legitBtn.disabled = true;
                phishBtn.disabled = true;
                nextBtn.classList.remove('hidden');
            }

            legitBtn.addEventListener('click', function () { answer(false); });
            phishBtn.addEventListener('click', function () { answer(true); });
            nextBtn.addEventListener('click', function () {
                currentEmail++;
                loadEmail();
            });

            loadEmail();
        })();
    </script>
</body>
</html>
