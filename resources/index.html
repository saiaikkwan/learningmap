<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Resources &mdash; Learning Map</title>
    <meta name="description" content="Complete directory of curated learning resources across web development, cybersecurity, networking, and ethical hacking.">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Header loads automatically via loader.js -->

    <header class="hero">
        <h1>
            <i class="fas fa-book-open"></i> All <span class="highlight">Resources</span>
        </h1>
        <p>Every curated resource across all four tracks in one place.</p>
    </header>

    <section class="container">
        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input
                type="text"
                id="search-input"
                class="search-input"
                placeholder="Search by name, topic, or note..."
            >
        </div>

        <div class="tabs">
            <button class="tab active" data-filter="all">All</button>
            <button class="tab" data-filter="free">Free</button>
            <button class="tab" data-filter="web">Web Dev</button>
            <button class="tab" data-filter="security">Cybersecurity</button>
            <button class="tab" data-filter="networking">Networking</button>
            <button class="tab" data-filter="hacking">Ethical Hacking</button>
            <button class="tab" data-filter="completed">&#9989; Completed</button>
            <button class="tab" data-filter="in-progress">&#128260; In Progress</button>
        </div>

        <div id="resources-count" style="text-align: center; color: var(--text-light); margin-bottom: 1rem; font-size: 0.85rem;"></div>
        <div id="resources-container">
            <p style="text-align: center; color: var(--text-light);">Loading resources&hellip;</p>
        </div>

        <div class="text-center mt-2">
            <a href="comparison.html" class="btn btn-outline">View Platform Comparison &rarr;</a>
        </div>
    </section>

    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>

    <script src="../js/loader.js"></script>
    <script src="../js/main.js"></script>
    <script>
        (function () {
            'use strict';

            var allResources = [];

            function flattenResources(data) {
                var result = [];

                function addResources(resources, track, trackName, category) {
                    if (resources) {
                        resources.forEach(function (r) {
                            result.push({
                                name: r.name,
                                type: r.type,
                                url: r.url,
                                cost: r.cost,
                                level: r.level,
                                rating: r.rating,
                                timeEstimate: r.timeEstimate,
                                note: r.note,
                                topics: r.topics || [],
                                status: r.status || 'planned',
                                track: track,
                                trackName: trackName,
                                category: category
                            });
                        });
                    }
                }

                if (data.webDevelopment) {
                    addResources(data.webDevelopment.frontend, 'web', 'Web Development', 'Frontend');
                    addResources(data.webDevelopment.backend, 'web', 'Web Development', 'Backend');
                }
                if (data.cybersecurity) {
                    addResources(data.cybersecurity.fundamentals, 'security', 'Cybersecurity', 'Fundamentals');
                }
                if (data.networking) {
                    addResources(data.networking.fundamentals, 'networking', 'Networking', 'Fundamentals');
                    addResources(data.networking.cisco, 'networking', 'Networking', 'Cisco');
                }
                if (data.ethicalHacking) {
                    addResources(data.ethicalHacking.platforms, 'hacking', 'Ethical Hacking', 'Platforms');
                }

                return result;
            }

            function render(filter, query) {
                filter = filter || 'all';
                query = query || '';

                var filtered = allResources.slice();

                if (filter === 'free') {
                    filtered = filtered.filter(function (r) { return r.cost === 'Free'; });
                } else if (filter === 'web') {
                    filtered = filtered.filter(function (r) { return r.track === 'web'; });
                } else if (filter === 'security') {
                    filtered = filtered.filter(function (r) { return r.track === 'security'; });
                } else if (filter === 'networking') {
                    filtered = filtered.filter(function (r) { return r.track === 'networking'; });
                } else if (filter === 'hacking') {
                    filtered = filtered.filter(function (r) { return r.track === 'hacking'; });
                } else if (filter === 'completed') {
                    filtered = filtered.filter(function (r) { return r.status === 'completed'; });
                } else if (filter === 'in-progress') {
                    filtered = filtered.filter(function (r) { return r.status === 'in-progress'; });
                }

                if (query) {
                    var q = query.toLowerCase();
                    filtered = filtered.filter(function (r) {
                        return r.name.toLowerCase().indexOf(q) !== -1 ||
                            r.type.toLowerCase().indexOf(q) !== -1 ||
                            r.note.toLowerCase().indexOf(q) !== -1 ||
                            r.level.toLowerCase().indexOf(q) !== -1 ||
                            r.category.toLowerCase().indexOf(q) !== -1 ||
                            r.trackName.toLowerCase().indexOf(q) !== -1 ||
                            (r.topics && r.topics.some(function (t) {
                                return t.toLowerCase().indexOf(q) !== -1;
                            }));
                    });
                }

                document.getElementById('resources-count').textContent =
                    'Showing ' + filtered.length + ' of ' + allResources.length + ' resources';

                var container = document.getElementById('resources-container');

                if (filtered.length === 0) {
                    container.innerHTML =
                        '<div style="text-align:center;padding:3rem;color:var(--text-light);">' +
                            '<i class="fas fa-search" style="font-size:3rem;margin-bottom:1rem;display:block;"></i>' +
                            '<p>No resources found matching your criteria.</p>' +
                        '</div>';
                    return;
                }

                var trackIcons = {
                    web: 'fas fa-code',
                    security: 'fas fa-shield-alt',
                    networking: 'fas fa-network-wired',
                    hacking: 'fas fa-user-secret'
                };

                var statusIcons = {
                    completed: '&#9989;',
                    'in-progress': '&#128260;',
                    planned: '&#128204;'
                };

                container.innerHTML = filtered.map(function (r) {
                    var stars = '';
                    for (var i = 0; i < 5; i++) {
                        stars += (i < r.rating) ? '&#9733;' : '&#9734;';
                    }

                    return (
                        '<div class="resource-card">' +
                            '<div class="resource-header">' +
                                '<h3>' + r.name + '</h3>' +
                                '<span class="rating">' + stars + '</span>' +
                            '</div>' +
                            '<div class="resource-meta">' +
                                '<span><i class="fas fa-tag"></i> ' + r.type + '</span>' +
                                '<span><i class="fas fa-dollar-sign"></i> ' + r.cost + '</span>' +
                                '<span><i class="fas fa-signal"></i> ' + r.level + '</span>' +
                                '<span><i class="' + (trackIcons[r.track] || '') + '"></i> ' + r.trackName + '</span>' +
                                '<span>' + (statusIcons[r.status] || '') + ' ' + (r.status || '').replace('-', ' ') + '</span>' +
                            '</div>' +
                            '<div class="resource-note">&ldquo;' + r.note + '&rdquo;</div>' +
                            (r.topics.length ? '<div class="card-tags">' +
                                r.topics.map(function (t) {
                                    return '<span class="tag tag-beginner">' + t + '</span>';
                                }).join('') +
                            '</div>' : '') +
                            '<div class="resource-links">' +
                                '<a href="' + r.url + '" class="btn btn-primary btn-sm" target="_blank" rel="noopener">' +
                                    '<i class="fas fa-external-link-alt"></i> Visit' +
                                '</a>' +
                            '</div>' +
                        '</div>'
                    );
                }).join('');
            }

            fetch('../data/resources.json')
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    allResources = flattenResources(data);
                    render();

                    var searchInput = document.getElementById('search-input');
                    var activeFilter = 'all';

                    searchInput.addEventListener('input', function () {
                        render(activeFilter, this.value);
                    });

                    document.querySelectorAll('.tab').forEach(function (tab) {
                        tab.addEventListener('click', function () {
                            document.querySelectorAll('.tab').forEach(function (t) {
                                t.classList.remove('active');
                            });
                            this.classList.add('active');
                            activeFilter = this.dataset.filter;
                            render(activeFilter, searchInput.value);
                        });
                    });
                })
                .catch(function (err) {
                    document.getElementById('resources-container').innerHTML =
                        '<p style="text-align:center;color:var(--danger);">' +
                        'Failed to load resources. ' + err.message +
                        '</p>';
                });
        })();
    </script>
</body>
</html>
