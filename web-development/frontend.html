<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Resources &mdash; Learning Map</title>
    <meta name="description" content="Curated frontend development resources: HTML, CSS, JavaScript, React, and more with honest reviews.">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!-- Header loads automatically via loader.js -->

    <div class="page-with-sidebar" style="padding-top: 80px;">
        <aside class="sidebar">
            <p class="sidebar-title">
                <i class="fas fa-code"></i> Web Development
            </p>
            <ul class="sidebar-menu">
                <li><a href="index.html">Overview</a></li>
                <li><a href="frontend.html" class="active">Frontend Resources</a></li>
                <li><a href="backend.html">Backend Resources</a></li>
                <li><a href="quiz.html">Take Quiz</a></li>
            </ul>
        </aside>

        <main class="content-area">
            <header class="hero">
                <h1>
                    <i class="fas fa-paint-brush"></i> <span class="highlight">Frontend</span> Resources
                </h1>
                <p>Courses, platforms, and tools for mastering the client-side.</p>
            </header>

            <div class="search-container" style="margin: 0 0 1.5rem 0; max-width: 100%;">
                <i class="fas fa-search search-icon"></i>
                <input
                    type="text"
                    id="search-input"
                    class="search-input"
                    placeholder="Search frontend resources..."
                >
            </div>

            <div class="tabs">
                <button class="tab active" data-filter="all">All</button>
                <button class="tab" data-filter="free">Free</button>
                <button class="tab" data-filter="beginner">Beginner</button>
                <button class="tab" data-filter="intermediate">Intermediate</button>
            </div>

            <div id="resources-container"></div>
        </main>
    </div>

    <!-- Footer placeholder -->
    <div id="footer-placeholder"></div>

    <script src="../js/loader.js"></script>
    <script src="../js/main.js"></script>
    <script>
        (function () {
            'use strict';

            var container = document.getElementById('resources-container');

            function renderResources(filter) {
                filter = filter || 'all';

                fetch('../data/resources.json')
                    .then(function (res) { return res.json(); })
                    .then(function (data) {
                        var resources = data.webDevelopment.frontend;

                        if (filter === 'free') {
                            resources = resources.filter(function (r) { return r.cost === 'Free'; });
                        } else if (filter === 'beginner') {
                            resources = resources.filter(function (r) { return r.level.indexOf('Beginner') !== -1; });
                        } else if (filter === 'intermediate') {
                            resources = resources.filter(function (r) { return r.level.indexOf('Intermediate') !== -1; });
                        }

                        container.innerHTML = resources.map(function (r) {
                            var stars = '';
                            for (var i = 0; i < 5; i++) {
                                stars += (i < r.rating) ? '&#9733;' : '&#9734;';
                            }

                            var statusIcon = r.status === 'completed' ? '&#9989;' :
                                r.status === 'in-progress' ? '&#128260;' : '&#128204;';

                            return (
                                '<div class="resource-card">' +
                                    '<div class="resource-header">' +
                                        '<h3>' + r.name + '</h3>' +
                                        '<span class="rating">' + stars + '</span>' +
                                    '</div>' +
                                    '<div class="resource-meta">' +
                                        '<span><i class="fas fa-tag"></i> ' + r.type + '</span>' +
                                        '<span><i class="fas fa-dollar-sign"></i> ' + r.cost + '</span>' +
                                        '<span><i class="fas fa-signal"></i> ' + r.level + '</span>' +
                                        '<span><i class="fas fa-clock"></i> ' + r.timeEstimate + '</span>' +
                                        '<span>' + statusIcon + ' ' + r.status.replace('-', ' ') + '</span>' +
                                    '</div>' +
                                    '<div class="resource-note">&ldquo;' + r.note + '&rdquo;</div>' +
                                    '<div class="card-tags">' +
                                        r.topics.map(function (t) {
                                            return '<span class="tag tag-beginner">' + t + '</span>';
                                        }).join('') +
                                    '</div>' +
                                    '<div class="resource-links">' +
                                        '<a href="' + r.url + '" class="btn btn-primary btn-sm" target="_blank" rel="noopener">' +
                                            '<i class="fas fa-external-link-alt"></i> Visit' +
                                        '</a>' +
                                    '</div>' +
                                '</div>'
                            );
                        }).join('');
                    });
            }

            renderResources();

            document.querySelectorAll('.tab').forEach(function (tab) {
                tab.addEventListener('click', function () {
                    document.querySelectorAll('.tab').forEach(function (t) {
                        t.classList.remove('active');
                    });
                    this.classList.add('active');
                    renderResources(this.dataset.filter);
                });
            });
        })();
    </script>
</body>
</html>
